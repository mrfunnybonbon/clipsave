<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Download YouTube, TikTok, Instagram, and X/Twitter videos with ease. Choose format, quality, and more.">
  <title>ClipSave Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon material-symbols-rounded" aria-hidden="true">control_camera</span>
        <span class="logo-text">ClipSave</span>
      </div>
      <p class="header-sub">Video & Audio Downloader</p>
    </header>

    <!-- URL Input Section -->
    <section class="url-section">
      <div class="input-group">
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <input
            type="text"
            id="url-input"
            placeholder="Paste a video URL (YouTube, TikTok, Instagram, X)..."
            autocomplete="off"
            spellcheck="false"
          >
          <button id="clear-btn" class="clear-btn" title="Clear">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <button id="fetch-btn" class="btn btn-primary">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span>Fetch</span>
        </button>
      </div>

      <!-- Platform Badges -->
      <div class="platform-badges">
        <span class="platform-badge youtube" title="YouTube">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        </span>
        <span class="platform-badge tiktok" title="TikTok">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.12-3.44-3.17-3.8-5.46-.4-2.51.56-5.11 2.53-6.66 1.11-.86 2.47-1.36 3.86-1.49.24-.02.48-.04.72-.02v4.06c-.04 0-.08-.01-.11-.01-1.07-.05-2.16.49-2.73 1.44-.5.81-.62 1.83-.24 2.72.39.9 1.3 1.53 2.27 1.62 1.05.07 2.1-.38 2.71-1.22.46-.66.69-1.47.67-2.28 0-4.03.02-8.06-.02-12.08.01-1.25.02-2.51.02-3.76z"/></svg>
        </span>
        <span class="platform-badge instagram" title="Instagram">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.88z"/></svg>
        </span>
        <span class="platform-badge twitter" title="X (Twitter)">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z"/></svg>
        </span>
      </div>
    </section>

    <!-- Loading -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>Fetching video info...</span>
    </div>

    <!-- Error -->
    <div id="error-toast" class="toast hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <span id="error-message"></span>
    </div>

    <!-- Video Info Card -->
    <section id="video-card" class="video-card hidden reveal-card">
      <div class="video-thumb-wrapper">
        <img id="video-thumb" src="" alt="Video thumbnail" class="video-thumb">
        <span id="video-duration" class="video-duration"></span>
      </div>
      <div class="video-details">
        <h2 id="video-title" class="video-title"></h2>
        <div class="platform-indicator" id="platform-indicator">
          <span class="platform-badge-small" id="platform-badge-icon"></span>
          <span id="platform-name">Platform</span>
        </div>
        <div class="video-meta">
          <span id="video-uploader" class="meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span></span>
          </span>
          <span id="video-views" class="meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <span></span>
          </span>
        </div>
      </div>
    </section>

    <!-- Download Options -->
    <section id="options-panel" class="options-panel hidden reveal-card">
      <h3 class="section-title">Download Options</h3>

      <div class="option-row">
        <label class="option-label">Audio Only</label>
        <label class="toggle" id="audio-toggle-label">
          <input type="checkbox" id="audio-only-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div id="video-options" class="options-group">
        <div class="option-row">
          <label class="option-label" for="video-format">Video Format</label>
          <div class="select-wrapper">
            <select id="video-format">
              <option value="mp4">MP4</option>
              <option value="mkv">MKV</option>
              <option value="webm">WEBM</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
        <div class="option-row">
          <label class="option-label" for="video-quality">Video Quality</label>
          <div class="select-wrapper">
            <select id="video-quality">
              <option value="best">Best Available</option>
              <option value="2160">4K (2160p)</option>
              <option value="1440">1440p</option>
              <option value="1080" selected>1080p</option>
              <option value="720">720p</option>
              <option value="480">480p</option>
              <option value="360">360p</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
      </div>

      <div id="audio-options" class="options-group hidden">
        <div class="option-row">
          <label class="option-label" for="audio-format">Audio Format</label>
          <div class="select-wrapper">
            <select id="audio-format">
              <option value="mp3">MP3</option>
              <option value="aac">AAC</option>
              <option value="flac">FLAC</option>
              <option value="wav">WAV</option>
              <option value="opus">Opus</option>
              <option value="vorbis">OGG Vorbis</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
        <div class="option-row">
          <label class="option-label" for="audio-quality">Audio Quality</label>
          <div class="select-wrapper">
            <select id="audio-quality">
              <option value="best">Best Available</option>
              <option value="320k">320 kbps</option>
              <option value="256k">256 kbps</option>
              <option value="192k">192 kbps</option>
              <option value="128k">128 kbps</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
      </div>

      <button id="download-btn" class="btn btn-download">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Download</span>
      </button>
    </section>

    <!-- Download Progress -->
    <div id="download-status" class="download-status hidden">
      <div class="spinner"></div>
      <span id="download-status-text">Preparing download...</span>
      <button id="cancel-download-btn" class="btn btn-cancel hidden" type="button">Stop</button>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>Powered by yt-dlp & ffmpeg • Supports YouTube, TikTok, Instagram & X</span>
    </footer>
  </div>

  <iframe id="download-frame" class="hidden" title="download frame"></iframe>
  <script src="app.js"></script>
</body>
</html>
